name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag name (for example, v1.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir dist
          if [ "$GOOS" = windows ]; then
            go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/uc.exe .
            zip -jq "dist/uc_${GOOS}_${GOARCH}.zip" dist/uc.exe
          else
            go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/uc .
            tar -C dist -czf "dist/uc_${GOOS}_${GOARCH}.tar.gz" uc
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: uc_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/uc_${{ matrix.goos }}_${{ matrix.goarch }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" dist/* --generate-notes
